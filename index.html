<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Agrinho - Gestão de Recursos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌾 Projeto Agrinho: Irrigação Sustentável</h1>
        <p class="subtitle">Calcule o consumo de água e entenda os impactos ambientais da sua plantação.</p>
        
        <form id="agrinhoForm">
            <div class="form-group">
                <label for="tamanhoTerra">Tamanho da terra (em Hectares):</label>
                <input type="number" id="tamanhoTerra" min="0.1" step="0.1" placeholder="Ex: 5" required>
            </div>

            <div class="form-group">
                <label for="tipoPlantacao">Escolha a Plantação:</label>
                <select id="tipoPlantacao" required>
                    <option value="">-- Selecione uma cultura --</option>
                    <option value="soja">Soja</option>
                    <option value="milho">Milho</option>
                    <option value="arroz">Arroz Irrigado</option>
                    <option value="hortalicas">Hortaliças</option>
                </select>
            </div>

            <button type="submit">Calcular Impacto</button>
        </form>

        <div id="resultado" class="hidden">
            <h2>📊 Relatório de Sustentabilidade</h2>
            <div class="card-agua">
                <p><strong>Água Necessária Estimada:</strong></p>
                <span id="litrosAgua">0</span> litros por dia
            </div>
            <div class="card-impacto">
                <p><strong>Impactos Ambientais e Dicas Agrinho:</strong></p>
                <p id="textoImpacto"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
